<!DOCTYPE html>
<html>
<head>
    <title>Emotion Detector</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: rgba(0,0,0,0.5);
            padding: 30px;
            border-radius: 16px;
            width: 420px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h2 {
            margin-bottom: 10px;
        }
        textarea {
            width: 100%;
            height: 100px;
            border-radius: 10px;
            border: none;
            padding: 12px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        button {
            background: linear-gradient(45deg, #ff7a18, #ff512f);
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-size: 15px;
            transition: 0.3s;
        }
        button:hover {
            transform: scale(1.05);
        }
        .result {
            margin-top: 20px;
            text-align: left;
        }
        .emotion-bar {
            margin: 6px 0;
        }
        .bar {
            height: 8px;
            border-radius: 5px;
            background: #00ffcc;
        }
        .emoji {
            font-size: 20px;
        }
        .loading {
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🤖 Emotion Detector AI</h2>
        <p>Type something and discover your emotion 😊</p>

        <textarea id="text" placeholder="How are you feeling today?"></textarea>
        <button onclick="analyze()">Analyze Emotion 🚀</button>

        <div class="loading" id="loading">⏳ Analyzing...</div>
        <div class="result" id="result"></div>

        <script>
            async function analyze() {
                const text = document.getElementById('text').value.trim();
                const loading = document.getElementById('loading');
                const result = document.getElementById('result');
                result.innerHTML = '';

                if (!text) {
                    result.textContent = 'Please enter some text to analyze.';
                    return;
                }

                loading.style.display = 'block';

                try {
                    const resp = await fetch('/emotion', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text })
                    });

                    const data = await resp.json();
                    loading.style.display = 'none';

                    if (!resp.ok) {
                        result.textContent = data.error || JSON.stringify(data);
                        return;
                    }

                    const title = document.createElement('h3');
                    title.textContent = 'Dominant: ' + (data.dominant_emotion || 'N/A');
                    result.appendChild(title);

                    const list = document.createElement('div');
                    for (const [k, v] of Object.entries(data.emotions || {})) {
                        const row = document.createElement('div');
                        row.className = 'emotion-bar';

                        const meta = document.createElement('div');
                        meta.style.display = 'flex';
                        meta.style.justifyContent = 'space-between';
                        meta.innerHTML = `<strong>${k}</strong><span>${(v*100).toFixed(1)}%</span>`;

                        const barWrap = document.createElement('div');
                        barWrap.style.background = 'rgba(255,255,255,0.12)';
                        barWrap.style.borderRadius = '6px';
                        barWrap.style.height = '12px';
                        barWrap.style.marginTop = '6px';

                        const bar = document.createElement('div');
                        bar.className = 'bar';
                        bar.style.width = Math.round((v || 0) * 100) + '%';

                        barWrap.appendChild(bar);
                        row.appendChild(meta);
                        row.appendChild(barWrap);
                        list.appendChild(row);
                    }

                    result.appendChild(list);

                } catch (err) {
                    loading.style.display = 'none';
                    result.textContent = 'Error: ' + err.message;
                }
            }
        </script>
    </div>
</body>
</html>
